<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Coffee Shop</title>
    <meta charset="utf-8" />
  </head>
  <body>
    <header>
      <h1>Coffee Shop</h1>
      <a href="#hot-drinks">Hot Drinks</a>
      <a href="#cold-drinks">Cold Drinks</a>
      <a href="#pastry-section">Pastries</a>
    </header>
    <main>
      <section id="hot-drinks">
        <h2>Hot Drinks</h2>
        <ul>
          <li>Americano</li>
          <li>Latte</li>
          <li>Cappucino</li>
        </ul>
        <div>
          <h4>Hot Drinks Gallery</h4>
          <img
            src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?w=1800&auto=format&fit=crop&q=60&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8YW1lcmljYW5vfGVufDB8fDB8fHww"
            alt="photo of americano"
            width="200px"
            height="300px"
          />
          <p>
            This photo was sourced from
            <a
              href="https://unsplash.com/photos/white-ceramic-mug-filled-with-coffee-nBJHO6wmRWw"
              target="_blank"
              >here</a
            >
          </p>
        </div>
      </section>
      <section id="cold-drinks">
        <h2>Cold Drinks</h2>
        <ul>
          <li>Iced Americano</li>
          <li>Iced Latte</li>
          <li>Frappe</li>
        </ul>
      </section>
      <section id="pastry-section">
        <h2>Pastries</h2>
        <ul>
          <li>Banana Bread</li>
          <li>Carrot Cake</li>
          <li>Biscotti</li>
        </ul>
      </section>
    </main>
    <footer>
      <p>&copy; 2025 Coffee Shop</p>
    </footer>
  </body>
</html>
